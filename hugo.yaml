  fr:
    languageName: "Français"
    weight: 3
    params:
      hero:
        intro: "Bonjour, je m'appelle"
        title: "Minah Ramandrosoa"
        subtitle: "Consultante Data"
        content: "De l'analyse de marché au déploiement ML — la technique au service des décisions qui comptent."
        button:
          name: "CV"
          url: /images/cv/resume_fr.pdf
      about:
        title: "À Propos de Moi"
        content: |-
          Data Scientist avec une formation en finance. Je conçois et déploie: modèles ML, systèmes de vision par ordinateur et NLP, applications IA — et des dashboards qui transforment les données en décisions concrètes.
        skills:
          title: "Voici quelques technologies avec lesquelles j'ai travaillé récemment:"
      experience:
        items:
          - company: "DataKanto"
            jobs:
              - name: "Consultante Data"
                date: "Avril 2025 - Présent"
                content: |
                  - Audité un modèle de scoring crédit pour un établissement financier, aidant les parties prenantes à mieux comprendre les limites des données et les risques affectant les résultats du modèle.
                  - Maintenu des pipelines de données avec dbt et GCP, permettant des flux analytiques reproductibles et évolutifs.
                  - Amélioré les processus d’ingestion de données depuis plusieurs bases, permettant un reporting précis et cohérent dans BigQuery et Looker.
                  - Travaillé en étroite collaboration avec un consultant senior, garantissant l’alignement des livrables analytiques avec les objectifs business et les attentes clients.
          - company: "SOCOBIS"
            jobs:
              - name: "Chargé d'Études Marketing"
                date: "Juin 2023 - Nov 2023"
                content: |
                  - Analysé des données d’enquêtes et de marché pour identifier des tendances économiques et des comportements consommateurs pertinents pour la stratégie business.
                  - Traduit les résultats analytiques en rapports et présentations clairs, soutenant la prise de décision de la direction.      
                  - Contribué à la conception de produits en valorisant les analyses marché et les données d'enquêtes.        
      education:
        items:
          - title: "Master en Science des Données (En cours)"
            school:
              name: "Illinois Institute of Technology  -  A distance"
            content: "J’ai acquis une solide formation en analyse et modélisation de données, couvrant la régression linéaire et non linéaire, la conception de bases de données relationnelles. Ces cours m’ont apporté à la fois des connaissances théoriques et des compétences pratiques pour résoudre des problèmes concrets de données.
"
          - title: "Diplôme Supérieur Spécialisé en Sciences Comptables"
            school:
              name: "Institut National des Sciences Comptables et de l’Administration d’Entreprises — Madagascar"
            content: "J’ai acquis des connaissances pratiques en entrepreneuriat, management, comptabilité et droit des sociétés, me permettant de comprendre le fonctionnement des entreprises et la manière dont elles prennent des décisions stratégiques, financières et juridiques.
"
      projects:
        items:
         
          - title: Prédicteur de Personnalité MBTI
            content: Un pipeline de traitement du langage naturel qui classe les types de personnalité Myers-Briggs à partir de texte, en utilisant des modèles de ML classiques déployés via FastAPI sur Hugging Face Spaces.
            image: /images/projects/mbti.jpg
            featured:
              name: Live demo
              link: https://ramandrosoa-mbti-predictor.hf.space/
            links:
              - icon: fab fa-github
                url: https://github.com/ramandrosoa/MBTI-Predictor
            badges:
              - "NLP"
              - "Machine Learning"
              - "Data Analysis"
              - "Python"

          - title: Géo Quiz App
            content: Une application d'apprentissage ludique construite avec Flask, dotée d'une interface évolutive en 5 étapes et d'un compagnon IA qui réagit à vos performances.
            image: /images/projects/companion.jpg
            featured:
              name: Live Demo
              link: https://companion-plum.vercel.app/
            badges:
              - "Flask"
              - "LLM"
            links:
              - icon: fab fa-github
                url: https://github.com/ramandrosoa/Companion


          - title: Transfert de style neuronal
            content: Un projet de deep learning qui fusionne le contenu d'une image avec le style artistique d'une autre, à l'aide d'un extracteur de caractéristiques VGG19 figé, déployé via FastAPI et Hugging Face Spaces.
            image: /images/projects/cv.jpg
            featured:
              name: Live demo
              link: https://ramandrosoa-neural-style-transfer.hf.space/
            badges:
              - "Deep Learning"
              - "Computer Vision"
              - "FastAPI"
            links:
              - icon: fab fa-github
                url: https://github.com/ramandrosoa/Neural-Style-Transfer


          - title: Tableau de bord de la qualité de l'air
            content: Un tableau de bord géospatial interactif cartographiant la qualité de l'air à Los Angeles pour révéler l'influence de la proximité des espaces verts sur les niveaux de pollution.
            image: /images/projects/gis.jpg
            featured:
              name: Live demo
              link:  https://air-quality-dashboard-q9at.onrender.com
            badges:
              - "OpenAQ"
              - "Google Street View"
              - "FastAPI"
              - "Python"
              - "Data Analysis"
            links:
              - icon: fab fa-github
                url: https://github.com/ramandrosoa/Air-Quality-Dashboard

      achievements:
        items:
          - title: Spécialisation en Apprentissage Approfondi
            url: https://example.com
            image: /images/achievement.jpg
          - title: Spécialisation en Apprentissage Automatique
            url: https://example.com
            image: /images/achievement.jpg
          - title: Spécialisation en Mathématiques pour les Sciences des Données et l'Apprentissage Automatique
            url: "https://github.com/gurusabarish/hugo-profile"
            image: /images/achievement.jpg

      contact:
        content: Ma boîte de réception est toujours ouverte. Que vous ayez une question ou que vous vouliez simplement dire bonjour, je serai ravie de vous répondre!
        btnName: Écrivez-moi

